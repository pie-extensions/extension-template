name: Sync from upstream

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync upstream releases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync from upstream
        id: sync
        uses: pie-extensions/mirror-action@v1
        with:
          mode: sync
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Summary
        if: always()
        run: |
          echo "Synced versions: ${{ steps.sync.outputs.synced-versions }}"
          echo "Latest version: ${{ steps.sync.outputs.latest-version }}"

  validate:
    name: Validate PIE compliance
    needs: sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Validate
        uses: pie-extensions/mirror-action@v1
        with:
          mode: validate
          github-token: ${{ secrets.GITHUB_TOKEN }}
